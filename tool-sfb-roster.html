---
layout: null
---
{% include header.html %}

<main class="page-container" style="padding: 40px 20px; max-width: 800px; margin: 40px auto; text-align: center;">
    {% include tools-subnav.html %}
    <h1 style="text-align: center; color: white;">#SFB16 Drafted Roster</h1>
    
<div id="inputContainer">
    <div>
        <label for="platform">Select Platform:</label>
        <select id="platform" onchange="handlePlatformChange()">
            <option value="sleeper">Sleeper</option>
            <option value="mfl">MyFantasyLeague</option>
        </select>
    </div>

    <div id="sleeperInputs" style="display: block;">
        <label for="username">Sleeper Username:</label>
        <input type="text" id="username" placeholder="Enter your Sleeper username">
    </div>

    <div id="mflInputs" style="display: none;">
        <label for="mflLeague">Select SFB16 League:</label>
        <select id="mflLeague" onchange="handleMFLLeagueChange()">
            <option value="">Select a league</option>
        </select>

        <label for="mflFranchise">Select Your Franchise:</label>
        <select id="mflFranchise">
            <option value="">Select a franchise</option>
        </select>
    </div>

    <button onclick="generateGraphic()">Generate Graphic</button>
    <div id="loader" style="display: none; margin-top: 10px;"></div>
</div>

<img id="finalImage" style="display: none; margin-top: 20px; max-width: 100%;">
<button id="downloadBtn" style="display: none; margin-top: 10px;" onclick="downloadImg()">Download Image</button>

<canvas id="canvas" style="display: none;"></canvas>

<script>
// Initialize the MFL league dropdown when page loads
document.addEventListener('DOMContentLoaded', () => {
    const leagueSelect = document.getElementById('mflLeague');
    const SFB16_LEAGUES = [
        { id: '42801', name: '#SFB16 - Baseball Stars' },
        { id: '46308', name: '#SFB16 - Crazy Taxi' },
        { id: '23484', name: '#SFB16 - Double dragon' },
        { id: '39518', name: '#SFB16 - Double dribble' },
        { id: '54792', name: '#SFB16 - Duck Hunt' },
        { id: '73136', name: '#SFB16 - Excitebike' },
        { id: '14494', name: '#SFB16 - Frogger' },
        { id: '61959', name: '#SFB16 - Ice Hockey' },
        { id: '43844', name: '#SFB16 - Metroid' },
        { id: '41323', name: '#SFB16 - Mutant League Football' },
        { id: '65583', name: '#SFB16 - NBA Jam (Berry)' },
        { id: '15797', name: '#SFB16 - NHL 2021' },
        { id: '72117', name: '#SFB16 - Pitfall' },
        { id: '55743', name: '#SFB16 - Pong' },
        { id: '25949', name: '#SFB16 - Rampage' },
        { id: '44962', name: '#SFB16 - Tetris' },
        { id: '38735', name: '#SFB16 - Zelda' }
    ];
    
    SFB16_LEAGUES.forEach(league => {
        const option = document.createElement('option');
        option.value = league.id;
        option.textContent = league.name;
        leagueSelect.appendChild(option);
    });
});
</script>
</main>

<script src="javascript/sfb-generator.js"></script>

{% include footer.html %}
