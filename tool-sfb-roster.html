---
layout: null
---
{% include header.html %}

<main class="page-container" style="padding: 40px 20px; max-width: 800px; margin: 40px auto; text-align: center;">
    {% include tools-subnav.html %}
    <h1 style="text-align: center; color: white;">#SFB16 Drafted Roster</h1>
    
<div id="inputContainer" class="sfb-input-group">
    <div style="width: 100%; margin-bottom: 20px;">
        <label for="platform" style="display: block; margin-bottom: 8px; color: #ffffff; font-weight: bold;">Select Platform:</label>
        <select id="platform" class="tool-select" onchange="handlePlatformChange()">
            <option value="sleeper">Sleeper</option>
            <option value="mfl">MyFantasyLeague</option>
        </select>
    </div>

    <div id="sleeperInputs" style="width: 100%; display: block;">
        <label for="username" style="display: block; margin-bottom: 8px; color: #ffffff; font-weight: bold;">Sleeper Username:</label>
        <input type="text" id="username" class="tool-input" placeholder="Enter your Sleeper username" style="width: 100%; max-width: 600px;">
    </div>

    <div id="mflInputs" style="width: 100%; display: none;">
        <label for="mflLeague" style="display: block; margin-bottom: 8px; color: #ffffff; font-weight: bold;">Select SFB16 League:</label>
        <select id="mflLeague" class="tool-select" onchange="handleMFLLeagueChange()" style="width: 100%; max-width: 600px;">
            <option value="">Select a league</option>
        </select>

        <label for="mflFranchise" style="display: block; margin-bottom: 8px; color: #ffffff; font-weight: bold; margin-top: 15px;">Select Your Franchise:</label>
        <select id="mflFranchise" class="tool-select" style="width: 100%; max-width: 600px;">
            <option value="">Select a franchise</option>
        </select>
    </div>

    <button onclick="generateGraphic()" class="tool-btn btn-find" style="margin-top: 20px; width: 100%; max-width: 600px;">Generate Graphic</button>
    <div id="loader" class="loader" style="display: none; margin-top: 10px;"></div>
</div>

<img id="finalImage" style="display: none; margin-top: 30px; max-width: 100%;">
<button id="downloadBtn" class="tool-btn btn-dl" style="display: none; margin-top: 20px; width: 100%; max-width: 600px;">Download Image</button>

<canvas id="canvas" style="display: none;"></canvas>

<script>
// Initialize the MFL league dropdown when page loads
// (Constants MFL_YEAR and SFB16_LEAGUES are defined in sfb-generator.js)
document.addEventListener('DOMContentLoaded', () => {
    const leagueSelect = document.getElementById('mflLeague');
    if (leagueSelect && typeof SFB16_LEAGUES !== 'undefined') {
        SFB16_LEAGUES.forEach(league => {
            const option = document.createElement('option');
            option.value = league.id;
            option.textContent = league.name;
            leagueSelect.appendChild(option);
        });
    }
});
</script>
</main>

<script src="javascript/sfb-generator.js"></script>

{% include footer.html %}
